[rpc]
min_page_size = 1
max_page_size = 500
heartbeat_timeout_secs = 30

[file_browse]
binary_extensions = [".jar", ".class", ".zip", ".gz", ".png", ".jpg", ".jpeg", ".gif", ".ico", ".pdf", ".exe", ".so", ".wasm"]
hidden_dirs = ["target", "node_modules"]
hidden_prefix = "."
max_file_size = 1048576

[engine]
beat_interval_secs = 3
main_loop_interval_secs = 3
error_backoff_secs = 10
log_rotate_max_mb = 50
disk_check_interval_beats = 10
disk_min_available_mb = 100
sandbox_user_prefix = "agent-"
test_instance_prefix = "test-"
test_instance_max_beats = 10
inference_backoff_base_secs = 10
inference_backoff_max_exponent = 5
inference_backoff_cap_secs = 300

[streaming]
poll_interval_ms = 200

[memory]
session_blocks_limit = 4
session_block_kb = 2
history_kb = 2
message_truncate_length = 200
safety_max_consecutive_beats = 10
safety_cooldown_secs = 30

[llm]
max_tokens = 16384
temperature = 0.5
default_model = "openrouter@anthropic/claude-opus-4.6"

[llm.providers]
openrouter = "https://openrouter.ai/api/v1/chat/completions"
openai = "https://api.openai.com/v1/chat/completions"
zenmux = "https://zenmux.ai/api/v1/chat/completions"
