<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Alice - Knowledge</title>
<style>
:root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1a1a26;
    --bg-hover: #22222e;
    --bg-active: #1e2a3a;
    --border: #2a2a3a;
    --text-primary: #e8e8f0;
    --text-secondary: #8888a0;
    --text-muted: #555568;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --safe: #51cf66;
    --warn: #ffd43b;
    --danger: #ff6b6b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg-primary); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

.layout { display: flex; height: 100vh; }

/* 左侧实例列表 */
.sidebar { width: 280px; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-header h3 { font-size: 14px; color: var(--text-secondary); }
.instance-list { flex: 1; overflow-y: auto; padding: 8px; }
.instance-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: background 0.2s; }
.instance-item:hover { background: var(--bg-hover); }
.instance-item.active { background: var(--bg-active); border: 1px solid var(--accent); }
.instance-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.instance-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.instance-name { font-size: 14px; font-weight: 600; }
.instance-id { font-size: 11px; color: var(--text-muted); }
.water-bar-container { height: 4px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden; }
.water-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }
.water-bar.level-safe { background: var(--safe); }
.water-bar.level-warn { background: var(--warn); }
.water-bar.level-danger { background: var(--danger); }
.knowledge-size-label { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; font-size: 11px; color: var(--text-muted); }
.water-dot { width: 6px; height: 6px; border-radius: 50%; }
.water-dot.level-safe { background: var(--safe); }
.water-dot.level-warn { background: var(--warn); }
.water-dot.level-danger { background: var(--danger); }

/* 右侧内容区 */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.main-header h2 { font-size: 18px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.back-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; text-decoration: none; }
.back-btn:hover { color: var(--text-primary); border-color: var(--text-secondary); }

.content-area { flex: 1; overflow-y: auto; padding: 20px; }

/* Knowledge原文展示 */
.k-section { margin-bottom: 16px; padding: 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; border-left: 3px solid var(--border); }
.k-section h2 { font-size: 16px; margin-bottom: 8px; color: var(--accent-light); }
.k-section h3 { font-size: 14px; margin-bottom: 6px; color: var(--text-primary); }
.k-section pre { white-space: pre-wrap; word-break: break-all; font-size: 13px; line-height: 1.6; color: var(--text-secondary); font-family: inherit; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.loading { display: flex; align-items: center; gap: 12px; padding: 40px 20px; justify-content: center; color: var(--text-secondary); }
.spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Mobile */
@media (max-width: 768px) {
    .sidebar { width: 100%; position: absolute; z-index: 10; height: 100%; }
    body.show-content .sidebar { display: none; }
    .mobile-back { display: inline-block !important; }
    .main { width: 100%; }
}
</style>
</head>
<body>
<div class="layout">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h3>Instances</h3></div>
        <div class="instance-list" id="instanceList"></div>
    </div>
    <div class="main">
        <div class="main-header">
            <h2>🧬 Knowledge</h2>
            <div class="header-actions">
                <button class="mobile-back" onclick="document.body.classList.remove('show-content')" style="display:none; background:none; border:1px solid var(--border); color:var(--text-secondary); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px;">← 列表</button>
                <a href="/" class="back-btn">← 返回</a>
            </div>
        </div>
        <div class="content-area" id="contentArea">
            <div class="empty-state">选择一个实例查看知识</div>
        </div>
    </div>
</div>
<script>
    let currentInstance = null;

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function apiFetch(url, options = {}) {
        const res = await fetch(url, options);
        if (res.status === 401) { window.location.href = '/login'; return null; }
        return res.json();
    }

    function getWaterLevel(bytes) {
        const kb = bytes / 1024;
        if (kb >= 60) return 'danger';
        if (kb >= 50) return 'warn';
        return 'safe';
    }

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        return (bytes / 1024).toFixed(1) + ' KB';
    }

    async function loadInstances() {
        const data = await apiFetch('/api/instances');
        if (data === null || data === undefined) return;
        const list = document.getElementById('instanceList');
        list.innerHTML = '';
        data.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        for (const inst of data) {
            const size = 0;
            const level = getWaterLevel(size);
            const pct = Math.min(100, (size / 1024 / 70) * 100);
            const item = document.createElement('div');
            item.className = 'instance-item' + (currentInstance === inst.id ? ' active' : '');
            item.innerHTML = `
                <div class="instance-header">
                    <div class="instance-avatar" style="background:${inst.color || '#6c5ce7'}">${inst.avatar || '🤖'}</div>
                    <div>
                        <div class="instance-name">${escHtml(inst.name)}</div>
                        <div class="instance-id">${inst.id}</div>
                    </div>
                </div>
                <div class="water-bar-container">
                    <div class="water-bar level-${level}" style="width:${pct}%"></div>
                </div>
                <div class="knowledge-size-label">
                    <span>${formatSize(size)}</span>
                    <span class="water-dot level-${level}"></span>
                </div>`;
            item.onclick = () => selectInstance(inst);
            list.appendChild(item);
        }
    }

    async function selectInstance(inst) {
        document.body.classList.add('show-content');
        currentInstance = inst.id;
        loadInstances();
        const contentEl = document.getElementById('contentArea');
        contentEl.innerHTML = '<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
        const data = await apiFetch(`/api/instances/${inst.id}/knowledge`);
        if (data === null || data === undefined) return;
        renderRawKnowledge(data.content || '', contentEl);
    }

    function renderRawKnowledge(content, el) {
        if (!content.trim()) { el.innerHTML = '<div class="empty-state">暂无知识</div>'; return; }
        const sections = content.split(/(?=^## )/m).filter(s => s.trim());
        let html = '';
        for (const sec of sections) {
            html += `<div class="k-section"><pre>${escHtml(sec.trim())}</pre></div>`;
        }
        el.innerHTML = html;
    }

    loadInstances();
</script>
</body>
</html>
