/* @SEC: js-files — loadFileTree + renderBreadcrumb + renderFileTree + loadFileContent + helpers */
async function loadFileTree(path) {
    if (!currentInstance) return;
    const data = await api('GET', 'api/instances/' + encodeURIComponent(currentInstance) + '/files/list?path=' + encodeURIComponent(path));
    frontendLog("INFO", "loadFileTree", "path=" + path + " dataType=" + (Array.isArray(data) ? "array" : typeof data) + " len=" + (Array.isArray(data) ? data.length : (data && data.items ? data.items.length : "N/A")));
    if (!data || data.error) {
        document.getElementById('fileTreeItems').innerHTML = '<div style="padding:12px;color:var(--text-muted);">' + (data ? escHtml(data.error) : 'Failed to load') + '</div>';
        return;
    }
    currentFilePath = path;
    renderBreadcrumb(path);
    renderFileTree(Array.isArray(data) ? data : (data.items || []), path);
}

function renderBreadcrumb(path) {
    const el = document.getElementById('fileTreePath');
    if (!path) {
        el.innerHTML = '<span onclick="loadFileTree(\'\')">/</span>';
        return;
    }
    const parts = path.split('/');
    let html = '<span onclick="loadFileTree(\'\')">/</span>';
    let accumulated = '';
    parts.forEach((p, i) => {
        accumulated += (i > 0 ? '/' : '') + p;
        const pathCopy = accumulated;
        html += ' <span onclick="loadFileTree(\'' + escHtml(pathCopy) + '\')">' + escHtml(p) + '</span>';
        if (i < parts.length - 1) html += ' /';
    });
    el.innerHTML = html;
}

function renderFileTree(items, basePath) {
    const el = document.getElementById('fileTreeItems');
    el.innerHTML = '';
    if (!items || items.length === 0) {
        el.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:13px;">Empty directory</div>';
        return;
    }
    // Add ".." back navigation for non-root directories
    if (basePath) {
        const upDiv = document.createElement('div');
        upDiv.className = 'file-item';
        upDiv.innerHTML = '<span class="file-item-icon">📁</span><span class="file-item-name" style="color:var(--text-muted)">..</span>';
        const parentPath = basePath.includes('/') ? basePath.substring(0, basePath.lastIndexOf('/')) : '';
        upDiv.onclick = function() { loadFileTree(parentPath); };
        el.appendChild(upDiv);
    }
    // Sort: directories first, then files, alphabetical within each group
    const sorted = items.slice().sort(function(a, b) {
        if (a.is_dir && !b.is_dir) return -1;
        if (!a.is_dir && b.is_dir) return 1;
        return a.name.localeCompare(b.name);
    });
    sorted.forEach(item => {
        const div = document.createElement('div');
        div.className = 'file-item';
        const fullPath = basePath ? basePath + '/' + item.name : item.name;
        const icon = item.is_dir ? '📁' : getFileIcon(item.name);
        const sizeStr = (item.size != null) ? formatSize(item.size) : '';

        div.innerHTML = '<span class="file-item-icon">' + icon + '</span>'
            + '<span class="file-item-name">' + escHtml(item.name) + '</span>'
            + (sizeStr ? '<span class="file-item-size">' + sizeStr + '</span>' : '')
            + '<button class="file-item-copy" onclick="event.stopPropagation();copyPath(\'' + escHtml(fullPath) + '\',this)" title="Copy path">📋</button>';

        if (item.is_dir) {
            div.onclick = function() { loadFileTree(fullPath); };
        } else {
            div.onclick = function() { loadFileContent(fullPath); document.querySelectorAll('.file-item').forEach(d => d.classList.remove('active')); div.classList.add('active'); };
        }
        el.appendChild(div);
    });
}

async function loadFileContent(path) {
    if (!currentInstance) return;
    const contentEl = document.getElementById('fileContent');
    contentEl.innerHTML = '<div class="file-content-empty"><div>Loading...</div></div>';

    const data = await api('GET', 'api/instances/' + encodeURIComponent(currentInstance) + '/files/read?path=' + encodeURIComponent(path));
    if (!data || data.error) {
        contentEl.innerHTML = '<div class="file-content-empty"><div>' + (data ? escHtml(data.error) : 'Failed to load') + '</div></div>';
        return;
    }

    if (data.binary) {
        var imgExts = ['png','jpg','jpeg','gif','webp','svg','bmp','ico'];
        var ext = data.name.split('.').pop().toLowerCase();
        if (imgExts.indexOf(ext) >= 0) {
            var imgUrl = 'serve/' + encodeURIComponent(currentInstance) + '/' + data.path;
            contentEl.innerHTML = '<div class="file-content-header"><span class="file-content-name">' + escHtml(data.name) + '</span>'
                + '<span class="file-content-path">' + escHtml(data.path) + '</span>'
                + '<button class="file-item-copy" style="opacity:1" onclick="copyPath(\'' + escHtml(data.path) + '\',this)">📋</button></div>'
                + '<div style="padding:16px;text-align:center;"><img src="' + imgUrl + '" style="max-width:100%;max-height:70vh;border-radius:8px;" onerror="this.parentElement.innerHTML=\'Failed to load image\'"></div>';
        } else {
            contentEl.innerHTML = '<div class="file-content-header"><span class="file-content-name">' + escHtml(data.name) + '</span>'
                + '<button class="file-item-copy" style="opacity:1" onclick="copyPath(\'' + escHtml(data.path) + '\',this)">📋</button></div>'
                + '<div class="file-content-binary">Binary file (' + formatSize(data.size) + ')</div>';
        }
        return;
    }

    contentEl.innerHTML = '<div class="file-content-header">'
        + '<span class="file-content-name">' + escHtml(data.name) + '</span>'
        + '<span class="file-content-path">' + escHtml(data.path) + '</span>'
        + '<button class="file-item-copy" style="opacity:1" onclick="copyPath(\'' + escHtml(data.path) + '\',this)">📋</button>'
        + '</div>'
        + '<pre class="file-content-body"></pre>';
    contentEl.querySelector('.file-content-body').textContent = data.content;
}

function openFileFromLink(path) {
    // Jump to files.html with the file path
    var parts = path.split('/');
    parts.pop();
    var dirPath = parts.join('/');
    window.location.href = 'files.html?instance=' + encodeURIComponent(currentInstance) + (dirPath ? '&path=' + encodeURIComponent(dirPath) : '');
}

function copyPath(path, btn) {
    navigator.clipboard.writeText(path).then(() => {
        btn.classList.add('copied');
        const orig = btn.textContent;
        btn.textContent = '✓';
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
    }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = path;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.classList.add('copied');
        btn.textContent = '✓';
        setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
    });
}

async function handleUpload(files) {
    if (!files || files.length === 0) return;
    const btn = document.querySelector('.upload-btn');
    const origText = btn.textContent;
    btn.textContent = '⏳';
    btn.disabled = true;
    const formData = new FormData();
    for (var i = 0; i < files.length; i++) {
        formData.append('files', files[i]);
    }
    try {
        const res = await fetch('api/instances/' + encodeURIComponent(currentInstance) + '/upload', { method: 'POST', body: formData });
        if (res.status === 401) { location.href = 'login'; return; }
        const data = await res.json();
        if (data && data.files && data.files.length > 0) {
            showToast('✅ ' + data.files.length + ' file(s) uploaded');
            loadFileTree('uploads');
        } else {
            showToast('❌ Upload failed');
        }
    } catch (e) {
        console.error('Upload failed:', e);
        showToast('❌ Upload failed: ' + e.message);
    }
    btn.textContent = origText;
    btn.disabled = false;
    document.getElementById('uploadInput').value = '';
}

function showToast(msg) {
    var t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity 0.3s;';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function() { t.style.opacity = '1'; });
    setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 3000);
}

function getFileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const icons = { java: '☕', xml: '📋', txt: '📝', md: '📖', json: '📊', yml: '⚙️', yaml: '⚙️', sh: '🔧', html: '🌐', css: '🎨', js: '📜', py: '🐍', properties: '⚙️', gitignore: '🔒' };
    return icons[ext] || '📄';
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'K';
    return (bytes / (1024 * 1024)).toFixed(1) + 'M';
}

// @SEC: js-inference ===== Inference Panel =====
let inferenceExpanded = false;
let inferenceTimer = null;

function startInferencePolling() {
    if (inferenceTimer) clearTimeout(inferenceTimer);
    pollInference();
    scheduleInferencePolling();
}

function stopInferencePolling() {
    if (inferenceTimer) clearTimeout(inferenceTimer);
    inferenceTimer = null;
}

function scheduleInferencePolling() {
    if (inferenceTimer) clearTimeout(inferenceTimer);
    const interval = isInstanceInferring ? 1000 : 5000;
    inferenceTimer = setTimeout(async () => {
        await pollInference();
        scheduleInferencePolling();
    }, interval);
}

async function pollInference() {
    if (!currentInstance) return;
    let data;
    try {
        data = await api('GET', 'api/instances/' + encodeURIComponent(currentInstance) + '/observe');
    } catch(e) {
        frontendLog('ERROR', 'poll_inference', 'instance=' + currentInstance + ' error=' + e.message);
        return;
    }
    if (!data || typeof data !== 'object') return;
    // Update inferring state for adaptive polling
    isInstanceInferring = !!data.inferring;

    // Update inference icon and label based on state
    const content = document.getElementById('inferenceContent');
    const label = document.getElementById('inferenceLabel');
    const icon = document.getElementById('inferenceIcon');
    if (data.inferring) {
        // Inferring state: show brain icon + reasoning info
        if (icon) icon.textContent = '🧠';
        if (data.infer_output && data.infer_output.length > 0) {
            const rawOutput = data.infer_output;
            const displayOutput = devMode ? rawOutput : filterSummaryOutput(rawOutput);
            const isSummaryHidden = (displayOutput !== rawOutput);
            label.textContent = isSummaryHidden ? 'Reasoning (整理记忆中)' : 'Reasoning (' + rawOutput.length + ' chars)';
            if (inferenceExpanded) {
                content.textContent = displayOutput;
                if (!inferenceUserScrolling) {
                    content.scrollTop = content.scrollHeight;
                }
            }
        } else {
            label.textContent = 'Reasoning';
            if (inferenceExpanded) {
                content.innerHTML = '<span class="inference-empty">No active reasoning</span>';
            }
        }
    } else if (data.idle) {
        // Idle state: show sleep icon + idle info
        if (icon) icon.textContent = '💤';
        if (data.idle_timeout_secs && data.idle_since) {
            const remaining = Math.max(0, data.idle_timeout_secs - Math.floor(Date.now() / 1000 - data.idle_since));
            label.textContent = 'idle ' + remaining + 's';
        } else {
            label.textContent = 'idle';
        }
        if (inferenceExpanded) {
            content.innerHTML = '<span class="inference-empty">No active reasoning</span>';
        }
    } else {
        // Other state (not inferring, not idle)
        if (icon) icon.textContent = '🧠';
        label.textContent = 'Reasoning';
        if (inferenceExpanded) {
            content.innerHTML = '<span class="inference-empty">No active reasoning</span>';
        }
    }

    // Update executing script
    const scriptEl = document.getElementById('observeScript');
    const scriptContent = document.getElementById('observeScriptContent');
    const scriptLabel = document.getElementById('observeScriptLabel');
    if (data.executing_script) {
        scriptEl.classList.add('active');
        scriptContent.textContent = data.executing_script;
        scriptLabel.textContent = 'Executing script...';
    } else {
        scriptEl.classList.remove('active');
        scriptContent.textContent = '';
    }
}

function filterSummaryOutput(text) {
    // 检测memory_summary/summary_confirm/summary_edit action
    if (/###ACTION_[0-9a-f]+###-(memory_summary|summary_confirm|summary_edit)/.test(text)) {
        return '🧹 正在整理记忆...';
    }
    // 检测SESSION/PERSISTENT/WORKING分段标记（memory_summary输出中）
    if (/###(SESSION|PERSISTENT|WORKING)_[0-9a-f]+###/.test(text)) {
        return '🧹 正在整理记忆...';
    }
    return text;
}

function toggleInference() {
    inferenceExpanded = !inferenceExpanded;
    document.getElementById('inferenceContent').classList.toggle('expanded', inferenceExpanded);
    document.getElementById('inferenceToggle').classList.toggle('expanded', inferenceExpanded);
    if (inferenceExpanded) pollInference();
}

async function saveSettings() {
    var body = {};
    var apiKey = document.getElementById('setApiKey').value.trim();
    var model = document.getElementById('setModel').value.trim();
    if (apiKey) body.api_key = apiKey;
    if (model) body.model = model;

    // Extra channels
    var rows = document.querySelectorAll('#extraChannelsList .settings-extra-row');
    var extras = [];
    rows.forEach(function(row) {
        var inputs = row.querySelectorAll('input');
        var k = inputs[0].value.trim(), m = inputs[1].value.trim();
        if (k || m) extras.push({api_key: k, model: m});
    });
    body.extra_channels = extras;

    var safetyMaxBeats = document.getElementById('setSafetyMaxBeats').value.trim();
    var safetyCooldown = document.getElementById('setSafetyCooldown').value.trim();
    var sessionBlocksLimit = document.getElementById('setSessionBlocksLimit').value.trim();
    var historyKb = document.getElementById('setHistoryKb').value.trim();
    var temperature = document.getElementById('setTemperature').value.trim();
    var maxTokens = document.getElementById('setMaxTokens').value.trim();
    if (safetyMaxBeats) body.safety_max_consecutive_beats = parseInt(safetyMaxBeats);
    if (safetyCooldown) body.safety_cooldown_secs = parseInt(safetyCooldown);
    if (sessionBlocksLimit) body.session_blocks_limit = parseInt(sessionBlocksLimit);
    if (historyKb) body.history_kb = parseInt(historyKb);
    if (temperature) body.temperature = parseFloat(temperature);
    if (maxTokens) body.max_tokens = parseInt(maxTokens);

    if (settingsMode === 'instance') {
        if (!currentInstance) return;
        var name = document.getElementById('setName').value.trim();
        var avatar = document.getElementById('setAvatar').value.trim();
        var color = document.getElementById('setColor').value;
        var privileged = document.getElementById('setPrivileged').checked;
        if (name) body.name = name;
        if (avatar) body.avatar = avatar;
        if (color) body.color = color;
        body.privileged = privileged;
        var res = await api('POST', 'api/instances/' + encodeURIComponent(currentInstance) + '/settings', body);
    } else {
        var res = await api('POST', 'api/settings', body);
    }

    if (res && res.success) {
        frontendLog('INFO', 'settings', 'Updated: ' + (res.updated||[]).join(', '));
        var btn = document.querySelector('#settingsPanel .primary');
        var orig = btn.textContent;
        btn.textContent = '✓ Saved';
        btn.style.background = 'var(--success)';
        setTimeout(function() {
            btn.textContent = orig;
            btn.style.background = '';
            closeSettings();
            if (settingsMode === 'instance') refreshInstances();
        }, 800);
    }
}

function openHub() {

    loadHubStatus();
}

function closeHub() {
    document.getElementById('hubOverlay').classList.remove('open');
}

async function loadHubStatus() {
    try {
        var data = await api('GET', 'api/hub/status');
        renderHubContent(data);
    } catch(e) {
        document.getElementById('hubContent').innerHTML = '<div style="color:#e74c3c;font-size:13px;">Failed to load hub status: ' + escHtml(e.message) + '</div>';
    }
}

function renderHubContent(status) {
    var mode = status.mode || 'off';
    var detail = status.detail || '';
    var html = '';

    // Status badge
    var badgeColor = mode === 'host' ? '#27ae60' : mode === 'joined' ? '#3498db' : 'var(--text-muted)';
    var badgeLabel = mode === 'host' ? '🟢 Host' : mode === 'joined' ? '🔵 Joined' : '⚫ Off';
    html += '<div class="hub-status-badge">';
    html += '<span style="font-size:16px;font-weight:600;color:' + badgeColor + ';">' + badgeLabel + '</span>';
    if (detail) html += '<span style="font-size:13px;color:var(--text-muted);">— ' + escHtml(detail) + '</span>';
    html += '</div>';

    if (mode === 'off') {
        // Enable Host card
        html += '<div class="hub-card">';
        html += '<div class="hub-card-title">🏠 Enable Host Mode</div>';
        html += '<div class="hub-card-desc">Start as a host. Other engines can join using the token.</div>';
        html += '<label>Join Token</label>';
        html += '<input id="hubEnableToken" type="text" placeholder="Enter a token for slaves to join" value="' + (localStorage.getItem('hub_enable_token') || '') + '">';
        html += '<button class="hub-btn hub-btn-primary" onclick="hubEnable()">Enable Host</button>';
        html += '</div>';

        // Join Room card
        html += '<div class="hub-card">';
        html += '<div class="hub-card-title">🔗 Join a Host</div>';
        html += '<div class="hub-card-desc">Connect to an existing host engine.</div>';
        html += '<label>Host URL</label>';
        html += '<input id="hubJoinUrl" type="text" placeholder="http://host-ip:port" value="' + (localStorage.getItem('hub_host_url') || '') + '">';
        html += '<label>Join Token</label>';
        html += '<input id="hubJoinToken" type="text" placeholder="Token provided by the host" value="' + (localStorage.getItem('hub_join_token') || '') + '">';
        html += '<button class="hub-btn hub-btn-blue" onclick="hubJoin()">Join</button>';
        html += '</div>';

    } else if (mode === 'host') {
        html += '<div class="hub-card">';
        html += '<div class="hub-card-title">🏠 Host Mode Active</div>';
        html += '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">' + escHtml(detail) + '</div>';
        html += '<button class="hub-btn hub-btn-danger" onclick="hubDisable()">Disable Host</button>';
        html += '</div>';

    } else if (mode === 'joined') {
        html += '<div class="hub-card">';
        html += '<div class="hub-card-title">🔗 Connected to Host</div>';
        html += '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">' + escHtml(detail) + '</div>';
        html += '<button class="hub-btn hub-btn-danger" onclick="hubLeave()">Leave</button>';
        html += '</div>';
    }

    document.getElementById('hubContent').innerHTML = html;
}

async function hubEnable() {
    var token = document.getElementById('hubEnableToken').value.trim();
    if (!token) { alert('Please enter a join token.'); return; }
    try {
        var res = await api('POST', 'api/hub/enable', { join_token: token });
        if (res && res.error) { alert('Error: ' + res.error); return; }
        localStorage.setItem('hub_enable_token', token);
        loadHubStatus();
        refreshInstances();
    } catch(e) {
        alert('Failed to enable host: ' + e.message);
    }
}

async function hubDisable() {
    if (!confirm('Disable host mode? All connected slaves will be disconnected.')) return;
    try {
        var res = await api('POST', 'api/hub/disable', {});
        if (res && res.error) { alert('Error: ' + res.error); return; }
        loadHubStatus();
        refreshInstances();
    } catch(e) {
        alert('Failed to disable host: ' + e.message);
    }
}

async function hubJoin() {
    var url = document.getElementById('hubJoinUrl').value.trim();
    var token = document.getElementById('hubJoinToken').value.trim();
    if (!url) { alert('Please enter the host URL.'); return; }
    if (!token) { alert('Please enter the join token.'); return; }
    try {
        var res = await api('POST', 'api/hub/join', { host_url: url, join_token: token });
        if (res && res.error) { alert('Error: ' + res.error); return; }
        localStorage.setItem('hub_host_url', url);
        localStorage.setItem('hub_join_token', token);
        loadHubStatus();
        refreshInstances();
    } catch(e) {
        alert('Failed to join host: ' + e.message);
    }
}

async function hubLeave() {
    if (!confirm('Leave the current host?')) return;
    try {
        var res = await api('POST', 'api/hub/leave', {});
        if (res && res.error) { alert('Error: ' + res.error); return; }
        loadHubStatus();
        refreshInstances();
    } catch(e) {
        alert('Failed to leave host: ' + e.message);
    }
}

// @SEC: js-ops ===== Ops Dropdown =====
function toggleOpsMenu(e) {
    e.stopPropagation();
    document.getElementById('opsMenu').classList.toggle('open');
}
document.addEventListener('click', function(e) {
    const menu = document.getElementById('opsMenu');
    if (menu && !e.target.closest('.ops-dropdown')) {
        menu.classList.remove('open');
    }
});

async function doInterrupt() {
    if (!currentInstance) return;
    const res = await api("POST", "api/instances/" + currentInstance + "/interrupt");
    if (res && res.success) {
        frontendLog("INFO", "interrupt", "Interrupt requested for " + currentInstance);
    }
    document.getElementById("opsMenu").classList.remove("open");
}

function updatePrivilegedBtn() {
    const btn = document.getElementById('privilegedBtn');
    if (!btn) return;
    const inst = cachedInstanceList.find(i => i.id === currentInstance);
    const priv = inst && inst.privileged;
    btn.textContent = priv ? '🔓 Privileged: On' : '🔒 Privileged: Off';
    btn.style.color = priv ? '#4CAF50' : '';
}

async function cycleModel() {
    if (!currentInstance) return;
    const btn = document.getElementById('modelSwitchBtn');
    const count = parseInt(btn?.dataset.modelCount || '1');
    const current = parseInt(btn?.dataset.activeModel || '0');
    const next = (current + 1) % count;
    const res = await api('POST', 'api/instances/' + encodeURIComponent(currentInstance) + '/switch-model', { index: next });
    if (res && res.success) {
        btn.dataset.activeModel = next;
        btn.textContent = next === 0 ? '🤖 Primary' : '🤖 Extra ' + next;
        btn.style.color = next === 0 ? '' : '#FF9800';
        frontendLog('INFO', 'switch_model', currentInstance + ' model=' + next);
    }
    document.getElementById('opsMenu').classList.remove('open');
}

async function togglePrivileged() {
    if (!currentInstance) return;
    const inst = cachedInstanceList.find(i => i.id === currentInstance);
    const currentVal = inst && inst.privileged;
    const newVal = !currentVal;
    const res = await api("POST", "api/instances/" + currentInstance + "/settings", { privileged: newVal });
    if (res && res.success) {
        if (inst) inst.privileged = newVal;
        updatePrivilegedBtn();
        frontendLog("INFO", "privileged", currentInstance + " privileged=" + newVal);
    }
    document.getElementById("opsMenu").classList.remove("open");
}

// Scroll detection for inference panel
(function() {
    const inferEl = document.getElementById('inferenceContent');
    let inferScrollTimer = null;
    inferEl.addEventListener('scroll', function() {
        const atBottom = inferEl.scrollHeight - inferEl.scrollTop - inferEl.clientHeight < 20;
        inferenceUserScrolling = !atBottom;
        // Reset after user stops scrolling and is at bottom
        clearTimeout(inferScrollTimer);
        inferScrollTimer = setTimeout(function() {
            const stillAtBottom = inferEl.scrollHeight - inferEl.scrollTop - inferEl.clientHeight < 20;
            if (stillAtBottom) inferenceUserScrolling = false;
        }, 300);
    });
    // Detect touch/mouse interaction
    inferEl.addEventListener('pointerdown', function() { inferenceUserScrolling = true; });
    inferEl.addEventListener('pointerup', function() {
        setTimeout(function() {
            const atBottom = inferEl.scrollHeight - inferEl.scrollTop - inferEl.clientHeight < 20;
            if (atBottom) inferenceUserScrolling = false;
        }, 200);
    });
})();

// Update sidebar footer with version and instance ID
function updateSidebarFooter() {
    const el = document.getElementById('sidebarFooter');
    if (!el) return;
    const parts = [];
    if (engineVersion && engineVersion !== 'dev') parts.push('v' + engineVersion);
    if (currentInstance) parts.push(currentInstance);
    el.textContent = parts.join(' · ') || '';
}
setInterval(updateSidebarFooter, 2000);
setTimeout(updateSidebarFooter, 500);
