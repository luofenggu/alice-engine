<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Alice — Setup</title>
<style>
:root {
    --bg-primary: #0a0a0f;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --text-primary: #e8e8f0;
    --text-muted: #555568;
    --border: #2a2a3a;
    --danger: #ff6b6b;
    --success: #00b894;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(108,92,231,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(162,155,254,0.05) 0%, transparent 50%);
    pointer-events: none;
}
.setup-card {
    background: rgba(18, 18, 26, 0.8);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 36px;
    width: 100%;
    max-width: 440px;
    text-align: center;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: relative;
}
.logo {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent-light), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
}
.subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 32px;
}
.form-group {
    margin-bottom: 16px;
    text-align: left;
}
.form-group label {
    display: block;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}
.form-group select,
.form-group input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(26, 26, 38, 0.8);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
}
.form-group select { cursor: pointer; }
.form-group select option { background: #1a1a26; }
.form-group input:focus,
.form-group select:focus { border-color: var(--accent); }
.form-group input::placeholder { color: var(--text-muted); }
.form-group .hint {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 6px;
}
.custom-url { display: none; margin-top: 8px; }
.custom-url.visible { display: block; }
button.submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    letter-spacing: 1px;
}
button.submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
button.submit-btn:active { transform: scale(0.98); }
button.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.error-msg {
    color: var(--danger);
    font-size: 13px;
    margin-top: 16px;
    min-height: 20px;
}
</style>
</head>
<body>
<div class="setup-card">
    <div class="logo">ALICE</div>
    <div class="subtitle">Welcome! Let's get you set up.</div>

    <div class="form-group">
        <label>Provider</label>
        <select id="providerSelect" onchange="onProviderChange()">
            <option value="zenmux">ZenMux</option>
            <option value="openrouter">OpenRouter</option>
            <option value="openai">OpenAI</option>
            <option value="custom">Custom URL</option>
        </select>
        <input type="text" id="customUrlInput" class="custom-url" placeholder="https://your-api.com/v1/chat/completions">
    </div>

    <div class="form-group">
        <label>API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-..." autofocus>
    </div>

    <div class="form-group">
        <label>Model</label>
        <input type="text" id="modelInput" value="anthropic/claude-opus-4.6">
        <div class="hint">e.g. anthropic/claude-sonnet-4-20250514, gpt-4o, deepseek/deepseek-chat</div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="doSetup()">Start</button>
    <div class="error-msg" id="errorMsg"></div>
</div>

<script>
function onProviderChange() {
    var sel = document.getElementById('providerSelect');
    var custom = document.getElementById('customUrlInput');
    if (sel.value === 'custom') {
        custom.className = 'custom-url visible';
        custom.focus();
    } else {
        custom.className = 'custom-url';
    }
}

async function doSetup() {
    var provider = document.getElementById('providerSelect').value;
    var customUrl = document.getElementById('customUrlInput').value.trim();
    var apiKey = document.getElementById('apiKeyInput').value.trim();
    var modelName = document.getElementById('modelInput').value.trim();
    var btn = document.getElementById('submitBtn');
    var err = document.getElementById('errorMsg');

    if (!apiKey) { err.textContent = 'Please enter your API key'; return; }
    if (!modelName) { err.textContent = 'Please enter a model name'; return; }
    if (provider === 'custom' && !customUrl) { err.textContent = 'Please enter the API URL'; return; }

    // Build model string: provider@model or url@model
    var prefix = provider === 'custom' ? customUrl : provider;
    var model = prefix + '@' + modelName;

    btn.disabled = true;
    btn.textContent = 'Setting up...';
    err.textContent = '';

    try {
        var res = await fetch('api/setup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ api_key: apiKey, model: model }),
        });

        if (res.ok) {
            btn.textContent = '✓ Ready';
            btn.style.background = 'var(--success)';
            setTimeout(function() { window.location.href = './'; }, 1500);
        } else {
            var data = await res.json().catch(function() { return {}; });
            err.textContent = data.error || 'Setup failed';
            btn.disabled = false;
            btn.textContent = 'Start';
        }
    } catch(e) {
        err.textContent = 'Connection error';
        btn.disabled = false;
        btn.textContent = 'Start';
    }
}
</script>
</body>
</html>
