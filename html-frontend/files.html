<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Files</title>
<style>
:root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-muted: #8888a0;
    --accent: #6c5ce7;
    --accent-hover: #a29bfe;
    --danger: #ff6b6b;
    --success: #51cf66;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-y: auto;
}

/* Top bar */
.topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.topbar .back-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
}
.topbar .back-btn:hover { background: var(--surface2); }

.breadcrumb {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    overflow-x: auto;
    white-space: nowrap;
}
.breadcrumb span {
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
}
.breadcrumb span:hover { color: var(--accent); background: var(--surface2); }
.breadcrumb span.current { color: var(--text); cursor: default; }
.breadcrumb span.current:hover { background: none; }
.breadcrumb .sep { color: var(--text-muted); cursor: default; padding: 0 2px; }
.breadcrumb .sep:hover { background: none; }

.topbar .upload-btn {
    background: var(--accent);
    border: none;
    color: var(--bg);
    font-size: 14px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
}
.topbar .upload-btn:hover { background: var(--accent-hover); }
.topbar .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    padding: 16px;
}

@media (max-width: 480px) {
    .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        padding: 8px;
    }
}

/* Card */
.card {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
}
.card:hover {
    transform: scale(1.03);
    border-color: var(--accent);
}
.card:active { transform: scale(0.97); }

/* Card thumbnail area */
.card-thumb {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    min-height: 0;
}

.card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-thumb .icon {
    font-size: 40px;
    opacity: 0.7;
}

.card-thumb .text-preview {
    width: 100%;
    height: 100%;
    padding: 8px;
    font-size: 9px;
    line-height: 1.3;
    color: var(--text-muted);
    overflow: hidden;
    word-break: break-all;
    font-family: 'SF Mono', 'Fira Code', monospace;
}

/* Folder thumbnail: 2x2 grid */
.card-thumb .folder-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    width: 100%;
    height: 100%;
    gap: 2px;
    padding: 6px;
}
.folder-grid .fg-cell {
    background: var(--surface2);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-size: 10px;
    color: var(--text-muted);
}
.folder-grid .fg-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Card label */
.card-label {
    padding: 6px 8px;
    font-size: 11px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    text-align: center;
}
.card-label .card-size {
    color: var(--text-muted);
    font-size: 9px;
}

/* File viewer (inline, replaces grid) */
.viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.viewer-header {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    gap: 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
}
.viewer-header .filename {
    flex: 1;
    font-size: 13px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.viewer-header .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
}
.viewer-header .copy-btn:hover { background: var(--accent); color: var(--bg); }

.viewer-body {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: pan-y;
    user-select: none;
    -webkit-user-select: none;
}
.viewer-body img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}
.viewer-body pre {
    width: 100%;
    padding: 16px;
    background: var(--bg);
    font-size: 13px;
    line-height: 1.5;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    align-self: flex-start;
    user-select: text;
    -webkit-user-select: text;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
}

/* Empty state */
.empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 15px;
}

/* Loading */
.loading {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
}
</style>
</head>
<body>

<div class="topbar">
    <button class="back-btn" id="backBtn" onclick="goBack()" title="Back">←</button>
    <div class="breadcrumb" id="breadcrumb"></div>
    <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">📤 Upload</button>
    <input type="file" id="fileInput" multiple style="display:none" onchange="handleUpload(this.files)">
</div>

<div class="grid" id="grid">
    <div class="loading">Loading...</div>
</div>

<div class="viewer" id="viewer" style="display:none;">
    <div class="viewer-header">
        <div class="filename" id="viewerFilename"></div>
        <button class="copy-btn" id="copyBtn" style="display:none;" onclick="copyFileContent()">📋 Copy</button>
        <button class="copy-btn" id="deleteBtn" onclick="deleteCurrentFile()" style="color:var(--danger);">🗑️</button>
    </div>
    <div class="viewer-body" id="viewerBody"></div>
</div>

<script>
var instanceId = new URLSearchParams(window.location.search).get('instance');
var currentPath = '';
var pathHistory = [];

var IMG_EXTS = ['png','jpg','jpeg','gif','webp','svg','bmp','ico'];
var TEXT_EXTS = ['txt','md','json','yml','yaml','xml','html','css','js','ts','py','rs','java','sh','toml','cfg','conf','log','csv','sql','rb','go','c','h','cpp','hpp'];

function isImage(name) {
    var ext = name.split('.').pop().toLowerCase();
    return IMG_EXTS.indexOf(ext) >= 0;
}

function isText(name) {
    var ext = name.split('.').pop().toLowerCase();
    return TEXT_EXTS.indexOf(ext) >= 0;
}

function getFileIcon(name) {
    var ext = name.split('.').pop().toLowerCase();
    var icons = {java:'☕',xml:'📋',txt:'📝',md:'📖',json:'📊',yml:'⚙️',yaml:'⚙️',sh:'🔧',html:'🌐',css:'🎨',js:'📜',py:'🐍',rs:'🦀',go:'🐹',rb:'💎',c:'⚡',cpp:'⚡',h:'📎',toml:'⚙️',sql:'🗃️',csv:'📊',log:'📋'};
    return icons[ext] || '📄';
}

function formatSize(bytes) {
    if (bytes == null) return '';
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + 'K';
    return (bytes / 1048576).toFixed(1) + 'M';
}

function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function servePath(filePath) {
    return 'serve/' + encodeURIComponent(instanceId) + '/' + filePath.split('/').map(encodeURIComponent).join('/');
}



async function loadDir(path) {
    currentPath = path;
    renderBreadcrumb(path);
    var grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">Loading...</div>';

    var url = 'api/instances/' + encodeURIComponent(instanceId) + '/files/list?path=' + encodeURIComponent(path);
    var data;
    try {
        var res = await fetch(url);
        if (!res.ok) { grid.innerHTML = '<div class="empty">Failed to load</div>'; return; }
        data = await res.json();
    } catch(e) {
        grid.innerHTML = '<div class="empty">Failed to load</div>';
        return;
    }

    var items = Array.isArray(data) ? data : (data.items || []);
    if (items.length === 0) {
        grid.innerHTML = '<div class="empty">Empty directory</div>';
        return;
    }

    // Sort: uploads first, then dirs, then files, alphabetical
    items.sort(function(a, b) {
        if (a.name === 'uploads') return -1;
        if (b.name === 'uploads') return 1;
        if (a.is_dir && !b.is_dir) return -1;
        if (!a.is_dir && b.is_dir) return 1;
        return a.name.localeCompare(b.name);
    });

    currentFiles = items; // save for swipe navigation
    grid.innerHTML = '';
    items.forEach(function(item) {
        var card = document.createElement('div');
        card.className = 'card';
        var itemPath = path ? (path + '/' + item.name) : item.name;

        if (item.is_dir) {
            card.onclick = function() {
                pathHistory.push(currentPath);
                loadDir(itemPath);
            };
            card.innerHTML =
                '<div class="card-thumb"><div class="folder-grid" id="fg-' + escHtml(item.name) + '"></div></div>' +
                '<div class="card-label">📁 ' + escHtml(item.name) + '</div>';
            grid.appendChild(card);
            loadFolderPreview(item.name, itemPath);
        } else if (isImage(item.name)) {
            card.onclick = function() { openFile(itemPath, item.name); };
            card.innerHTML =
                '<div class="card-thumb"><img src="' + servePath(itemPath) + '" loading="lazy"></div>' +
                '<div class="card-label">' + escHtml(item.name) + (item.size != null ? ' <span class="card-size">' + formatSize(item.size) + '</span>' : '') + '</div>';
            grid.appendChild(card);
        } else if (isText(item.name)) {
            card.onclick = function() { openFile(itemPath, item.name); };
            card.innerHTML =
                '<div class="card-thumb"><div class="text-preview" id="tp-' + escHtml(item.name) + '">Loading...</div></div>' +
                '<div class="card-label">' + escHtml(item.name) + (item.size != null ? ' <span class="card-size">' + formatSize(item.size) + '</span>' : '') + '</div>';
            grid.appendChild(card);
            loadTextPreview(item.name, itemPath);
        } else {
            card.onclick = function() { openFile(itemPath, item.name); };
            card.innerHTML =
                '<div class="card-thumb"><span class="icon">' + getFileIcon(item.name) + '</span></div>' +
                '<div class="card-label">' + escHtml(item.name) + (item.size != null ? ' <span class="card-size">' + formatSize(item.size) + '</span>' : '') + '</div>';
            grid.appendChild(card);
        }
    });
}

async function loadFolderPreview(name, dirPath) {
    var el = document.getElementById('fg-' + name);
    if (!el) return;
    try {
        var res = await fetch('api/instances/' + encodeURIComponent(instanceId) + '/files/list?path=' + encodeURIComponent(dirPath));
        if (!res.ok) { el.innerHTML = '<div class="fg-cell">📁</div>'; return; }
        var data = await res.json();
        var items = Array.isArray(data) ? data : (data.items || []);
        var cells = '';
        var count = Math.min(items.length, 4);
        for (var i = 0; i < 4; i++) {
            if (i < count) {
                var child = items[i];
                var childPath = dirPath + '/' + child.name;
                if (child.is_dir) {
                    cells += '<div class="fg-cell">📁</div>';
                } else if (isImage(child.name)) {
                    cells += '<div class="fg-cell"><img src="' + servePath(childPath) + '" loading="lazy"></div>';
                } else {
                    cells += '<div class="fg-cell">' + getFileIcon(child.name) + '</div>';
                }
            } else {
                cells += '<div class="fg-cell"></div>';
            }
        }
        el.innerHTML = cells;
    } catch(e) {
        el.innerHTML = '<div class="fg-cell">📁</div>';
    }
}

async function loadTextPreview(name, filePath) {
    var el = document.getElementById('tp-' + name);
    if (!el) return;
    try {
        var res = await fetch('api/instances/' + encodeURIComponent(instanceId) + '/files/read?path=' + encodeURIComponent(filePath));
        if (!res.ok) { el.textContent = ''; return; }
        var data = await res.json();
        var content = data.content || data || '';
        if (typeof content !== 'string') content = JSON.stringify(content);
        el.textContent = content.substring(0, 500);
    } catch(e) {
        el.textContent = '';
    }
}

var currentFiles = []; // files in current directory (for swipe navigation)
var currentFileIndex = -1;
var viewerContent = ''; // for copy
var currentFilePath = ''; // for delete

async function openFile(filePath, name) {
    // Find index in currentFiles for swipe navigation
    currentFileIndex = -1;
    for (var i = 0; i < currentFiles.length; i++) {
        if (currentFiles[i].name === name) { currentFileIndex = i; break; }
    }

    document.getElementById('grid').style.display = 'none';
    document.getElementById('viewer').style.display = 'flex';
    document.getElementById('viewerFilename').textContent = name;
    currentFilePath = filePath;

    var body = document.getElementById('viewerBody');
    var copyBtn = document.getElementById('copyBtn');
    copyBtn.style.display = 'none';
    viewerContent = '';

    if (isImage(name)) {
        body.innerHTML = '<img src="' + servePath(filePath) + '">';
    } else {
        body.innerHTML = '<pre>Loading...</pre>';
        try {
            var res = await fetch('api/instances/' + encodeURIComponent(instanceId) + '/files/read?path=' + encodeURIComponent(filePath));
            if (!res.ok) { body.innerHTML = '<pre>Failed to load</pre>'; return; }
            var data = await res.json();
            var c = data.content || data || '';
            if (typeof c !== 'string') c = JSON.stringify(c, null, 2);
            body.querySelector('pre').textContent = c;
            viewerContent = c;
            copyBtn.style.display = 'block';
        } catch(e) {
            body.innerHTML = '<pre>Failed to load</pre>';
        }
    }
}

function hideViewer() {
    document.getElementById('viewer').style.display = 'none';
    document.getElementById('grid').style.display = 'grid';
}

async function deleteCurrentFile() {
    if (!currentFilePath) return;
    var name = currentFilePath.split('/').pop();
    if (!confirm('Delete "' + name + '"?')) return;
    try {
        var res = await fetch('api/instances/' + encodeURIComponent(instanceId) + '/files/delete?path=' + encodeURIComponent(currentFilePath), { method: 'DELETE' });
        if (res.ok) {
            showToast('🗑️ Deleted');
            hideViewer();
            loadDir(currentPath);
        } else {
            var data = await res.json().catch(function() { return {}; });
            showToast('❌ ' + (data.message || 'Delete failed'));
        }
    } catch(e) {
        showToast('❌ Delete failed');
    }
}

function copyFileContent() {
    if (!viewerContent) return;
    navigator.clipboard.writeText(viewerContent).then(function() {
        showToast('📋 Copied');
    }).catch(function() {
        showToast('❌ Copy failed');
    });
}

// Swipe navigation for viewer
(function() {
    var startX = 0, startY = 0, swiping = false;
    var vb = document.getElementById('viewerBody');
    vb.addEventListener('touchstart', function(e) {
        if (currentFileIndex < 0) return;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        swiping = true;
    });
    vb.addEventListener('touchend', function(e) {
        if (!swiping) return;
        swiping = false;
        var dx = e.changedTouches[0].clientX - startX;
        var dy = e.changedTouches[0].clientY - startY;
        if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return; // too short or vertical
        if (dx < 0) { navigateFile(1); } // swipe left = next
        else { navigateFile(-1); } // swipe right = prev
    });
})();

function navigateFile(dir) {
    var newIdx = currentFileIndex + dir;
    // Skip directories
    while (newIdx >= 0 && newIdx < currentFiles.length && currentFiles[newIdx].is_dir) {
        newIdx += dir;
    }
    if (newIdx < 0 || newIdx >= currentFiles.length) return;
    currentFileIndex = newIdx;
    var item = currentFiles[newIdx];
    var itemPath = currentPath ? (currentPath + '/' + item.name) : item.name;
    openFile(itemPath, item.name);
}

function renderBreadcrumb(path) {
    var el = document.getElementById('breadcrumb');
    var html = '<span onclick="pathHistory=[];loadDir(\'\')">📂 Workspace</span>';
    if (path) {
        var parts = path.split('/');
        var accumulated = '';
        for (var i = 0; i < parts.length; i++) {
            accumulated += (i > 0 ? '/' : '') + parts[i];
            html += '<span class="sep">›</span>';
            if (i === parts.length - 1) {
                html += '<span class="current">' + escHtml(parts[i]) + '</span>';
            } else {
                var p = accumulated;
                html += '<span onclick="pathHistory=[];loadDir(\'' + escHtml(p) + '\')">' + escHtml(parts[i]) + '</span>';
            }
        }
    }
    el.innerHTML = html;
}

function goBack() {
    var viewerVisible = document.getElementById('viewer').style.display !== 'none';
    if (viewerVisible) {
        hideViewer();
        return;
    }
    if (pathHistory.length > 0) {
        loadDir(pathHistory.pop());
    } else if (currentPath) {
        var parts = currentPath.split('/');
        parts.pop();
        loadDir(parts.join('/'));
    } else {
        window.location.href = 'index.html';
    }
}

function compressImage(file, maxSize, quality) {
    return new Promise(function(resolve) {
        if (!file.type.match(/^image\/(jpeg|png|webp|bmp)$/)) {
            resolve(file);
            return;
        }
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
                var w = img.width, h = img.height;
                if (w <= maxSize && h <= maxSize) {
                    resolve(file);
                    return;
                }
                var ratio = Math.min(maxSize / w, maxSize / h);
                var nw = Math.round(w * ratio), nh = Math.round(h * ratio);
                var canvas = document.createElement('canvas');
                canvas.width = nw;
                canvas.height = nh;
                var ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, nw, nh);
                canvas.toBlob(function(blob) {
                    if (blob) {
                        var compressed = new File([blob], file.name.replace(/\.\w+$/, '.jpg'), { type: 'image/jpeg' });
                        resolve(compressed);
                    } else {
                        resolve(file);
                    }
                }, 'image/jpeg', quality);
            };
            img.onerror = function() { resolve(file); };
            img.src = e.target.result;
        };
        reader.onerror = function() { resolve(file); };
        reader.readAsDataURL(file);
    });
}

async function handleUpload(files) {
    if (!files || files.length === 0) return;
    var btn = document.getElementById('uploadBtn');
    btn.textContent = '⏳';
    btn.disabled = true;
    var formData = new FormData();
    for (var i = 0; i < files.length; i++) {
        var compressed = await compressImage(files[i], 960, 0.8);
        formData.append('files', compressed);
    }
    try {
        var res = await fetch('api/instances/' + instanceId + '/upload', { method: 'POST', body: formData });
        if (res.ok) {
            showToast('✅ Uploaded ' + files.length + ' file(s)');
            loadDir('uploads');
        } else {
            showToast('❌ Upload failed');
        }
    } catch(e) {
        showToast('❌ Upload failed');
    }
    btn.textContent = '📤 Upload';
    btn.disabled = false;
    document.getElementById('fileInput').value = '';
}

function showToast(msg) {
    var t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function() { t.style.opacity = '1'; });
    setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 3000);
}

// Keyboard
document.addEventListener('keydown', function(e) {
    var viewerVisible = document.getElementById('viewer').style.display !== 'none';
    if (e.key === 'Escape' && viewerVisible) {
        hideViewer();
    }
    if (e.key === 'Backspace' && !viewerVisible) {
        e.preventDefault();
        goBack();
    }
    if (e.key === 'ArrowLeft' && viewerVisible) { navigateFile(-1); }
    if (e.key === 'ArrowRight' && viewerVisible) { navigateFile(1); }
});

// Init
if (!instanceId) {
    document.getElementById('grid').innerHTML = '<div class="empty">No instance specified. Use ?instance=ID</div>';
} else {
    var initPath = new URLSearchParams(window.location.search).get('path') || '';
    loadDir(initPath);
}
</script>
</body>
</html>
