<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Alice</title>
<style>
:root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1a1a26;
    --bg-hover: #22222e;
    --bg-active: #1e2a3a;
    --border: #2a2a3a;
    --text-primary: #e8e8f0;
    --text-secondary: #8888a0;
    --text-muted: #555568;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --accent-glow: rgba(108, 92, 231, 0.3);
    --user-bubble: #6c5ce7;
    --user-bubble-end: #5a4bd1;
    --agent-bubble: #1e1e2e;
    --danger: #ff6b6b;
    --success: #51cf66;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --safe-left: env(safe-area-inset-left);
    --safe-right: env(safe-area-inset-right);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    height: 100vh;
    height: 100dvh;
}

/* ===== Sidebar ===== */
.sidebar {
    width: 300px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
}
.sidebar-header {
    padding: 20px;
    padding-top: calc(20px + var(--safe-top));
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.sidebar-header h2 {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-light), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
}
.logout-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
}
.logout-btn:hover { color: var(--danger); border-color: var(--danger); }

.instance-list { flex: 1; overflow-y: auto; padding: 8px; }
.instance-list::-webkit-scrollbar { width: 4px; }
.instance-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.instance-item {
    padding: 14px 16px;
    cursor: pointer;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
    transition: all 0.15s;
}
.instance-item:hover { background: var(--bg-hover); }
.instance-item.active { background: var(--bg-active); box-shadow: inset 3px 0 0 var(--accent); }
.instance-name { font-size: 14px; font-weight: 500; }
.instance-meta { display: flex; align-items: center; gap: 8px; }
.instance-badge {
    background: var(--danger);
    color: #fff;
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    min-width: 20px;
    text-align: center;
}
.instance-idle {
    color: var(--success);
    font-size: 11px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
}
.instance-idle::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--success);
    border-radius: 50%;
    display: inline-block;
}
.instance-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
    opacity: 0;
    transition: all 0.15s;
    line-height: 1;
}
.instance-item:hover .instance-delete { opacity: 1; }
.instance-delete:hover { color: var(--danger); background: rgba(255,107,107,0.1); }

.create-bar {
    padding: 12px 16px;
    padding-bottom: calc(12px + var(--safe-bottom));
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
}
.create-bar input {
    flex: 1;
    padding: 10px 14px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}
.create-bar input:focus { border-color: var(--accent); }
.create-bar input::placeholder { color: var(--text-muted); }
.create-bar button {
    padding: 10px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
}
.create-bar button:hover { background: var(--accent-light); }
.create-bar button:active { transform: scale(0.96); }

/* ===== Chat Area ===== */
.chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.chat-header {
    padding: 16px 20px;
    padding-top: calc(16px + var(--safe-top));
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
}
.chat-header h3 {
    font-size: 17px;
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.menu-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    transition: background 0.15s;
    line-height: 1;
}
.menu-btn:hover { background: var(--bg-hover); }

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    animation: msgIn 0.25s ease-out;
}
@keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}
.msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--user-bubble), var(--user-bubble-end));
    color: #fff;
    border-bottom-right-radius: 6px;
    box-shadow: 0 2px 12px var(--accent-glow);
}
.msg.agent {
    align-self: flex-start;
    background: var(--agent-bubble);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
}

.no-instance {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 12px;
}
.no-instance-icon { font-size: 48px; opacity: 0.5; }
.no-instance-text { font-size: 15px; }

.chat-input {
    padding: 12px 16px;
    padding-bottom: calc(12px + var(--safe-bottom));
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
}
.chat-input textarea {
    flex: 1;
    padding: 12px 16px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-primary);
    font-size: 15px;
    resize: none;
    height: 46px;
    max-height: 120px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.4;
}
.chat-input textarea:focus { border-color: var(--accent); }
.chat-input textarea::placeholder { color: var(--text-muted); }
.send-btn {
    width: 46px;
    height: 46px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
}
.send-btn:hover { background: var(--accent-light); transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }
.send-btn svg { width: 20px; height: 20px; fill: currentColor; }

/* ===== Mobile ===== */
@media (max-width: 768px) {
    .sidebar {
        width: 80%;
        max-width: 320px;
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: none;
    }
    .sidebar.open {
        transform: translateX(0);
        box-shadow: 4px 0 24px rgba(0,0,0,0.5);
    }
    .chat-area { width: 100%; }
    .menu-btn { display: flex !important; }
    .msg { max-width: 85%; }
    .chat-input textarea { height: 42px; }
    .send-btn { width: 42px; height: 42px; }
    .instance-delete { opacity: 0.6; }
}

.sidebar-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 50;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
}
.sidebar-overlay.open { display: block; }

/* ===== Inference Panel ===== */
.inference-bar {
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    font-size: 13px;
    display: none;
}
.inference-header {
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    color: var(--text-secondary);
    transition: color 0.2s;
}
.inference-header:hover { color: var(--text-primary); }
.inference-icon { font-size: 14px; }
.inference-label { flex: 1; font-size: 12px; }
.inference-toggle {
    font-size: 10px;
    transition: transform 0.3s;
    color: var(--text-muted);
}
.inference-toggle.expanded { transform: rotate(180deg); }
.inference-content {
    max-height: 0;
    overflow-y: auto;
    transition: max-height 0.3s ease, padding 0.3s ease;
    padding: 0 16px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
}
.inference-content.expanded {
    max-height: 250px;
    padding: 4px 16px 10px;
}
.inference-content::-webkit-scrollbar { width: 3px; }
.inference-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.inference-empty {
    color: var(--text-muted);
    font-style: italic;
}

/* ===== Deploy Button ===== */
.uptime-label {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
}
.deploy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
}
.deploy-btn:hover { color: var(--accent-light); border-color: var(--accent); }
.deploy-btn:active { transform: scale(0.96); }
.deploy-btn.deploying {
    color: var(--success);
    border-color: var(--success);
    pointer-events: none;
    animation: deployPulse 1.5s infinite;
}
@keyframes deployPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* ===== View Toggle ===== */
.view-toggle {
    display: none;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
}
.view-toggle button {
    background: none;
    border: none;
    color: var(--text-secondary);
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
}
.view-toggle button.active {
    background: var(--accent);
    color: #fff;
}
.view-toggle button:hover:not(.active) {
    color: var(--text-primary);
    background: var(--bg-hover);
}

/* ===== File Browser ===== */
.file-browser {
    flex: 1;
    display: none;
    flex-direction: row;
    overflow: hidden;
}
.file-browser.active { display: flex; }
.chat-messages.hidden { display: none !important; }

.file-tree {
    width: 260px;
    min-width: 200px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px 0;
    flex-shrink: 0;
    background: var(--bg-secondary);
}
.file-tree::-webkit-scrollbar { width: 4px; }
.file-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.file-tree-header {
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.file-tree-path {
    padding: 4px 12px 8px;
    font-size: 12px;
    color: var(--text-secondary);
    word-break: break-all;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
}
.file-tree-path span {
    cursor: pointer;
    transition: color 0.15s;
}
.file-tree-path span:hover { color: var(--accent-light); }

.file-item {
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.1s;
    user-select: none;
}
.file-item:hover { background: var(--bg-hover); }
.file-item.active { background: var(--bg-active); }
.file-item-icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
.file-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item-size { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
.file-item-copy {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.15s;
    flex-shrink: 0;
}
.file-item:hover .file-item-copy { opacity: 1; }
.file-item-copy:hover { color: var(--accent-light); background: var(--bg-tertiary); }
.file-item-copy.copied { color: var(--success); }

.file-content {
    flex: 1;
    overflow: auto;
    padding: 16px;
    background: var(--bg-primary);
}
.file-content::-webkit-scrollbar { width: 4px; }
.file-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.file-content-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
}
.file-content-name {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
}
.file-content-path {
    font-size: 11px;
    color: var(--text-muted);
}
.file-content-body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-secondary);
    tab-size: 4;
}
.file-content-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    gap: 8px;
}
.file-content-empty-icon { font-size: 36px; opacity: 0.5; }
.file-content-binary {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
}

/* File link in messages */
.file-link {
    color: var(--accent-light);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 2px;
}
.file-link:hover { color: #fff; }

@media (max-width: 768px) {
    .file-browser { flex-direction: column; }
    .file-tree {
        width: 100%;
        max-height: 40vh;
        border-right: none;
        border-bottom: 1px solid var(--border);
    }
}

/* Loading dots */
.typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
.typing-indicator span {
    width: 7px; height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>ALICE</h2>
        <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
    <div class="instance-list" id="instanceList"></div>
    <div class="create-bar">
        <input type="text" id="newName" placeholder="New instance..." onkeydown="if(event.key==='Enter')createInstance()">
        <button onclick="createInstance()">+</button>
    </div>
</div>

<div class="chat-area">
    <div class="chat-header">
        <button class="menu-btn" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <h3 id="chatTitle">Select an instance</h3>
        <div class="view-toggle" id="viewToggle" style="display:none;">
            <button class="active" id="chatViewBtn" onclick="switchView('chat')">💬 Chat</button>
            <button id="filesViewBtn" onclick="switchView('files')">📁 Files</button>
        </div>
        <span class="uptime-label" id="uptimeLabel" style="display:none;"></span>
        <button class="deploy-btn" id="deployBtn" style="display:none;" onclick="doDeploy()">🚀 Deploy</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="no-instance" id="noInstance">
            <div class="no-instance-icon">💬</div>
            <div class="no-instance-text">Create or select an instance to start</div>
        </div>
    </div>
    <div class="file-browser" id="fileBrowser">
        <div class="file-tree" id="fileTree">
            <div class="file-tree-header">📂 Workspace</div>
            <div class="file-tree-path" id="fileTreePath"></div>
            <div id="fileTreeItems"></div>
        </div>
        <div class="file-content" id="fileContent">
            <div class="file-content-empty">
                <div class="file-content-empty-icon">📄</div>
                <div>Select a file to view</div>
            </div>
        </div>
    </div>
    <div class="inference-bar" id="inferenceBar">
        <div class="inference-header" onclick="toggleInference()">
            <span class="inference-icon">🧠</span>
            <span class="inference-label" id="inferenceLabel">Reasoning</span>
            <span class="inference-toggle" id="inferenceToggle">▼</span>
        </div>
        <div class="inference-content" id="inferenceContent"><span class="inference-empty">No active reasoning</span></div>
    </div>
    <div class="chat-input" id="chatInput" style="display:none;">
        <textarea id="msgInput" placeholder="Message..." onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
let currentInstance = null;
let messages = {};
let pollTimer = null;
let userScrolledUp = false;
let systemStartTime = null;
let inferenceUserScrolling = false;

(async function() {
    try {
        const res = await fetch('/api/auth/check');
        const data = await res.json();
        if (!data.authenticated) { window.location.href = '/login'; return; }
        if (data.startTime) { systemStartTime = data.startTime; }
    } catch(e) { window.location.href = '/login'; return; }
    refreshInstances();
    setInterval(refreshInstances, 5000);
})();

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
}

async function api(method, path, body) {
    const opts = { method };
    if (body !== undefined) {
        opts.body = typeof body === 'string' ? body : JSON.stringify(body);
    }
    const res = await fetch(path, opts);
    if (res.status === 401) { window.location.href = '/login'; return null; }
    const text = await res.text();
    try { return JSON.parse(text); } catch(e) { return text; }
}

async function doLogout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/login';
}

async function refreshInstances() {
    const list = await api('GET', '/api/instances');
    if (!Array.isArray(list)) return;
    // Sort by lastActive descending (most recent first)
    list.sort((a, b) => (b.lastActive || 0) - (a.lastActive || 0));
    const el = document.getElementById('instanceList');
    el.innerHTML = '';
    if (list.length === 0 && !currentInstance) {
        showWelcomePage();
        return;
    }
    // Auto-select most recent instance on first load
    if (!currentInstance && list.length > 0) {
        switchInstance(list[0].name);
    }
    list.forEach(inst => {
        const displayName = inst.displayName || inst.name;
        const div = document.createElement('div');
        div.className = 'instance-item' + (inst.name === currentInstance ? ' active' : '');
        div.onclick = (e) => { if (!e.target.closest('.instance-delete')) { switchInstance(inst.name); if(window.innerWidth <= 768) toggleSidebar(); } };
        let badge = '';
        if (inst.unread > 0) badge = '<span class="instance-badge">' + inst.unread + '</span>';
        else if (inst.idle) badge = '<span class="instance-idle">idle</span>';
        let deleteBtn = '<button class="instance-delete" onclick="deleteInstance(\'' + escHtml(inst.name) + '\',event)" title="Delete">&times;</button>';
        div.innerHTML = '<span class="instance-name">' + escHtml(displayName) + '</span>'
            + '<span class="instance-meta">' + badge + deleteBtn + '</span>';
        el.appendChild(div);
    });
}

async function createInstance() {
    const input = document.getElementById('newName');
    const name = input.value.trim();
    if (name) {
        // Named instance
        await api('POST', '/api/instances/' + encodeURIComponent(name));
        input.value = '';
        await refreshInstances();
        switchInstance(name);
    } else {
        // Auto-generate ID
        const result = await api('POST', '/api/instances');
        input.value = '';
        if (result && result.name) {
            await refreshInstances();
            switchInstance(result.name);
        }
    }
    if(window.innerWidth <= 768) toggleSidebar();
}

async function deleteInstance(name, event) {
    if (event) event.stopPropagation();
    if (!confirm('Delete "' + name + '"?')) return;
    await api('DELETE', '/api/instances/' + encodeURIComponent(name));
    if (currentInstance === name) {
        currentInstance = null;
        document.getElementById('chatTitle').textContent = 'Select an instance';
        document.getElementById('chatMessages').innerHTML = '<div class="no-instance" id="noInstance"><div class="no-instance-icon">💬</div><div class="no-instance-text">Create or select an instance to start</div></div>';
        document.getElementById('chatInput').style.display = 'none';
    }
    delete messages[name];
    await refreshInstances();
}

async function switchInstance(name) {
    currentInstance = name;
    // Look up displayName from instance list
    const list = await api('GET', '/api/instances');
    let displayName = name;
    if (Array.isArray(list)) {
        const inst = list.find(i => i.name === name);
        if (inst && inst.displayName) displayName = inst.displayName;
    }
    document.getElementById('chatTitle').textContent = displayName;
    // Hide welcome page if visible
    const welcomeEl = document.getElementById('welcomePage');
    if (welcomeEl) welcomeEl.style.display = 'none';
    const noInst = document.getElementById('noInstance');
    if (noInst) noInst.style.display = 'none';
    document.getElementById('chatInput').style.display = 'flex';
    document.getElementById('inferenceBar').style.display = 'block';
    document.getElementById('deployBtn').style.display = 'inline-flex';
    document.getElementById('viewToggle').style.display = 'flex';
    currentView = 'chat';
    switchView('chat');
    updateUptimeLabel();
    await loadHistory(name);
    renderMessages();
    refreshInstances();
    startPolling();
    startInferencePolling();
    setTimeout(() => document.getElementById('msgInput').focus(), 100);
}

async function loadHistory(name) {
    const history = await api('GET', '/api/instances/' + encodeURIComponent(name) + '/history');
    if (Array.isArray(history)) {
        messages[name] = history.map(m => ({ role: m.role, content: m.content }));
    } else {
        if (!messages[name]) messages[name] = [];
    }
}

function renderMessages() {
    const el = document.getElementById('chatMessages');
    const msgs = messages[currentInstance] || [];
    el.innerHTML = '';
    msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = 'msg ' + m.role;
        // Parse [[file:path]] links
        const content = m.content;
        const filePattern = /\[\[file:([^\]]+)\]\]/g;
        let lastIdx = 0;
        let match;
        let hasLinks = false;
        const frag = document.createDocumentFragment();
        while ((match = filePattern.exec(content)) !== null) {
            hasLinks = true;
            if (match.index > lastIdx) {
                frag.appendChild(document.createTextNode(content.substring(lastIdx, match.index)));
            }
            const link = document.createElement('span');
            link.className = 'file-link';
            link.textContent = '📄 ' + match[1].split('/').pop();
            link.title = match[1];
            link.onclick = (function(p) { return function() { openFileFromLink(p); }; })(match[1]);
            frag.appendChild(link);
            lastIdx = match.index + match[0].length;
        }
        if (hasLinks) {
            if (lastIdx < content.length) {
                frag.appendChild(document.createTextNode(content.substring(lastIdx)));
            }
            div.appendChild(frag);
        } else {
            div.textContent = content;
        }
        el.appendChild(div);
    });
    requestAnimationFrame(() => el.scrollTop = el.scrollHeight);
}

async function sendWelcomeMessage() {
    const input = document.getElementById('welcomeInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    // Create auto-named instance
    const result = await api('POST', '/api/instances');
    if (result && result.name) {
        await switchInstance(result.name);
        // Send the first message
        if (!messages[result.name]) messages[result.name] = [];
        messages[result.name].push({ role: 'user', content: text });
        renderMessages();
        await api('POST', '/api/instances/' + encodeURIComponent(result.name) + '/messages', text);
        refreshInstances();
    }
}

function showWelcomePage() {
    document.getElementById('chatInput').style.display = 'none';
    document.getElementById('inferenceBar').style.display = 'none';
    document.getElementById('chatMessages').innerHTML = '';
    const existing = document.getElementById('welcomePage');
    if (existing) { existing.style.display = 'flex'; return; }
    const welcome = document.createElement('div');
    welcome.id = 'welcomePage';
    welcome.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px;text-align:center;';
    welcome.innerHTML = '<div style="font-size:48px;margin-bottom:20px;">✨</div>'
        + '<h2 style="color:#e0e0f0;margin-bottom:12px;">Welcome</h2>'
        + '<p style="color:#808090;margin-bottom:32px;max-width:400px;">Send your first message to create a new AI assistant. It will be born with a blank memory, ready to grow with you.</p>'
        + '<div style="display:flex;gap:8px;width:100%;max-width:500px;">'
        + '<textarea id="welcomeInput" placeholder="Say hello..." style="flex:1;padding:12px 16px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:12px;color:#e0e0f0;font-size:15px;resize:none;height:48px;font-family:inherit;" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendWelcomeMessage()}"></textarea>'
        + '<button onclick="sendWelcomeMessage()" style="padding:12px 20px;background:#7c3aed;color:white;border:none;border-radius:12px;cursor:pointer;font-size:14px;white-space:nowrap;">Send</button>'
        + '</div>';
    document.querySelector('.chat-area').appendChild(welcome);
}

async function sendMessage() {
    if (!currentInstance) return;
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = '46px';
    if (!messages[currentInstance]) messages[currentInstance] = [];
    messages[currentInstance].push({ role: 'user', content: text });
    renderMessages();
    await api('POST', '/api/instances/' + encodeURIComponent(currentInstance) + '/messages', text);
    refreshInstances();
}

function handleKeydown(event) {
    if (event.key === 'Enter' && !event.shiftKey && window.innerWidth > 768) {
        event.preventDefault();
        sendMessage();
    }
    if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) {
        event.preventDefault();
        sendMessage();
    }
}

function autoResize(el) {
    el.style.height = '46px';
    if (el.scrollHeight > 46) {
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
}

function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(pollReplies, 1000);
}

async function pollReplies() {
    if (!currentInstance) return;
    const replies = await api('GET', '/api/instances/' + encodeURIComponent(currentInstance) + '/replies');
    if (Array.isArray(replies) && replies.length > 0) {
        if (!messages[currentInstance]) messages[currentInstance] = [];
        replies.forEach(r => messages[currentInstance].push({ role: 'agent', content: r }));
        renderMessages();
    }
    refreshInstances();
}

function updateUptimeLabel() {
    const label = document.getElementById('uptimeLabel');
    if (!systemStartTime) { label.style.display = 'none'; return; }
    label.style.display = 'inline';
    const now = Date.now();
    const diff = Math.floor((now - systemStartTime) / 1000);
    if (diff < 60) { label.textContent = '⏱ ' + diff + 's'; }
    else if (diff < 3600) { label.textContent = '⏱ ' + Math.floor(diff / 60) + 'm'; }
    else if (diff < 86400) { label.textContent = '⏱ ' + Math.floor(diff / 3600) + 'h' + Math.floor((diff % 3600) / 60) + 'm'; }
    else { label.textContent = '⏱ ' + Math.floor(diff / 86400) + 'd' + Math.floor((diff % 86400) / 3600) + 'h'; }
}
setInterval(updateUptimeLabel, 30000);
function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== View Toggle & File Browser =====
let currentView = 'chat';
let currentFilePath = '';

function switchView(view) {
    currentView = view;
    const chatEl = document.getElementById('chatMessages');
    const fileEl = document.getElementById('fileBrowser');
    const chatBtn = document.getElementById('chatViewBtn');
    const filesBtn = document.getElementById('filesViewBtn');
    const inputEl = document.getElementById('chatInput');
    const inferEl = document.getElementById('inferenceBar');

    if (view === 'chat') {
        chatEl.classList.remove('hidden');
        fileEl.classList.remove('active');
        chatBtn.classList.add('active');
        filesBtn.classList.remove('active');
        inputEl.style.display = 'flex';
        inferEl.style.display = 'block';
    } else {
        chatEl.classList.add('hidden');
        fileEl.classList.add('active');
        chatBtn.classList.remove('active');
        filesBtn.classList.add('active');
        inputEl.style.display = 'none';
        inferEl.style.display = 'none';
        loadFileTree('');
    }
}

async function loadFileTree(path) {
    if (!currentInstance) return;
    const data = await api('GET', '/api/instances/' + encodeURIComponent(currentInstance) + '/files/list?path=' + encodeURIComponent(path));
    if (!data || data.error) {
        document.getElementById('fileTreeItems').innerHTML = '<div style="padding:12px;color:var(--text-muted);">' + (data ? escHtml(data.error) : 'Failed to load') + '</div>';
        return;
    }
    currentFilePath = path;
    renderBreadcrumb(path);
    renderFileTree(data.items, path);
}

function renderBreadcrumb(path) {
    const el = document.getElementById('fileTreePath');
    if (!path) {
        el.innerHTML = '<span onclick="loadFileTree(\'\')">/</span>';
        return;
    }
    const parts = path.split('/');
    let html = '<span onclick="loadFileTree(\'\')">/</span>';
    let accumulated = '';
    parts.forEach((p, i) => {
        accumulated += (i > 0 ? '/' : '') + p;
        const pathCopy = accumulated;
        html += ' <span onclick="loadFileTree(\'' + escHtml(pathCopy) + '\')">' + escHtml(p) + '</span>';
        if (i < parts.length - 1) html += ' /';
    });
    el.innerHTML = html;
}

function renderFileTree(items, basePath) {
    const el = document.getElementById('fileTreeItems');
    el.innerHTML = '';
    if (!items || items.length === 0) {
        el.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:13px;">Empty directory</div>';
        return;
    }
    items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'file-item';
        const fullPath = basePath ? basePath + '/' + item.name : item.name;
        const icon = item.type === 'dir' ? '📁' : getFileIcon(item.name);
        const sizeStr = item.size !== undefined ? formatSize(item.size) : '';

        div.innerHTML = '<span class="file-item-icon">' + icon + '</span>'
            + '<span class="file-item-name">' + escHtml(item.name) + '</span>'
            + (sizeStr ? '<span class="file-item-size">' + sizeStr + '</span>' : '')
            + '<button class="file-item-copy" onclick="event.stopPropagation();copyPath(\'' + escHtml(fullPath) + '\',this)" title="Copy path">📋</button>';

        if (item.type === 'dir') {
            div.onclick = function() { loadFileTree(fullPath); };
        } else {
            div.onclick = function() { loadFileContent(fullPath); document.querySelectorAll('.file-item').forEach(d => d.classList.remove('active')); div.classList.add('active'); };
        }
        el.appendChild(div);
    });
}

async function loadFileContent(path) {
    if (!currentInstance) return;
    const contentEl = document.getElementById('fileContent');
    contentEl.innerHTML = '<div class="file-content-empty"><div>Loading...</div></div>';

    const data = await api('GET', '/api/instances/' + encodeURIComponent(currentInstance) + '/files/read?path=' + encodeURIComponent(path));
    if (!data || data.error) {
        contentEl.innerHTML = '<div class="file-content-empty"><div>' + (data ? escHtml(data.error) : 'Failed to load') + '</div></div>';
        return;
    }

    if (data.binary) {
        contentEl.innerHTML = '<div class="file-content-header"><span class="file-content-name">' + escHtml(data.name) + '</span>'
            + '<button class="file-item-copy" style="opacity:1" onclick="copyPath(\'' + escHtml(data.path) + '\',this)">📋</button></div>'
            + '<div class="file-content-binary">Binary file (' + formatSize(data.size) + ')</div>';
        return;
    }

    contentEl.innerHTML = '<div class="file-content-header">'
        + '<span class="file-content-name">' + escHtml(data.name) + '</span>'
        + '<span class="file-content-path">' + escHtml(data.path) + '</span>'
        + '<button class="file-item-copy" style="opacity:1" onclick="copyPath(\'' + escHtml(data.path) + '\',this)">📋</button>'
        + '</div>'
        + '<pre class="file-content-body"></pre>';
    contentEl.querySelector('.file-content-body').textContent = data.content;
}

function openFileFromLink(path) {
    switchView('files');
    // Navigate to the directory containing the file, then open the file
    const parts = path.split('/');
    const fileName = parts.pop();
    const dirPath = parts.join('/');
    loadFileTree(dirPath).then(() => {
        loadFileContent(path);
    });
}

function copyPath(path, btn) {
    navigator.clipboard.writeText(path).then(() => {
        btn.classList.add('copied');
        const orig = btn.textContent;
        btn.textContent = '✓';
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
    }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = path;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.classList.add('copied');
        btn.textContent = '✓';
        setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
    });
}

function getFileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    const icons = { java: '☕', xml: '📋', txt: '📝', md: '📖', json: '📊', yml: '⚙️', yaml: '⚙️', sh: '🔧', html: '🌐', css: '🎨', js: '📜', py: '🐍', properties: '⚙️', gitignore: '🔒' };
    return icons[ext] || '📄';
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'K';
    return (bytes / (1024 * 1024)).toFixed(1) + 'M';
}

// ===== Inference Panel =====
let inferenceExpanded = false;
let inferenceTimer = null;

function startInferencePolling() {
    if (inferenceTimer) clearInterval(inferenceTimer);
    pollInference();
    inferenceTimer = setInterval(pollInference, 1000);
}

async function pollInference() {
    if (!currentInstance) return;
    const data = await api('GET', '/api/instances/' + encodeURIComponent(currentInstance) + '/inference');
    if (!data || typeof data !== 'object') return;
    const content = document.getElementById('inferenceContent');
    const label = document.getElementById('inferenceLabel');
    if (data.output && data.output.length > 0) {
        label.textContent = 'Reasoning (' + data.output.length + ' chars)';
        if (inferenceExpanded) {
            content.textContent = data.output;
            // Auto-scroll to bottom only if user is not manually scrolling
            if (!inferenceUserScrolling) {
                content.scrollTop = content.scrollHeight;
            }
        }
    } else {
        label.textContent = 'Reasoning';
        if (inferenceExpanded) {
            content.innerHTML = '<span class="inference-empty">No active reasoning</span>';
        }
    }
}

function toggleInference() {
    inferenceExpanded = !inferenceExpanded;
    document.getElementById('inferenceContent').classList.toggle('expanded', inferenceExpanded);
    document.getElementById('inferenceToggle').classList.toggle('expanded', inferenceExpanded);
    if (inferenceExpanded) pollInference();
}

// ===== Deploy =====
async function doDeploy() {
    if (!currentInstance) return;
    if (!confirm('Build and redeploy Alice? The service will restart in a few seconds.')) return;
    const btn = document.getElementById('deployBtn');
    btn.classList.add('deploying');
    btn.textContent = '⏳ Deploying...';
    try {
        const res = await api('POST', '/api/instances/' + encodeURIComponent(currentInstance) + '/deploy');
        if (res && res.status === 'deploying') {
            // Show countdown
            let countdown = 30;
            const timer = setInterval(() => {
                countdown--;
                btn.textContent = '⏳ Restarting... ' + countdown + 's';
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.textContent = '🔄 Reconnecting...';
                    // Try to reconnect
                    attemptReconnect();
                }
            }, 1000);
        } else {
            btn.classList.remove('deploying');
            btn.textContent = '🚀 Deploy';
            alert('Deploy failed: ' + JSON.stringify(res));
        }
    } catch(e) {
        btn.classList.remove('deploying');
        btn.textContent = '🚀 Deploy';
        alert('Deploy error: ' + e.message);
    }
}

async function attemptReconnect() {
    const btn = document.getElementById('deployBtn');
    let attempts = 0;
    const maxAttempts = 30;
    const tryConnect = async () => {
        attempts++;
        try {
            const res = await fetch('/api/auth/check', { signal: AbortSignal.timeout(3000) });
            const data = await res.json();
            if (data.authenticated) {
                btn.classList.remove('deploying');
                btn.textContent = '✅ Deployed!';
                setTimeout(() => { btn.textContent = '🚀 Deploy'; }, 3000);
                // Refresh everything
                refreshInstances();
                if (currentInstance) switchInstance(currentInstance);
                return;
            }
        } catch(e) { /* ignore */ }
        if (attempts < maxAttempts) {
            btn.textContent = '🔄 Reconnecting... (' + attempts + '/' + maxAttempts + ')';
            setTimeout(tryConnect, 2000);
        } else {
            btn.classList.remove('deploying');
            btn.textContent = '❌ Failed';
            setTimeout(() => { btn.textContent = '🚀 Deploy'; }, 5000);
            alert('Could not reconnect after deploy. Please refresh the page manually.');
        }
    };
    // Wait a bit before first attempt (server is restarting)
    setTimeout(tryConnect, 5000);
}

// Scroll detection for inference panel
(function() {
    const inferEl = document.getElementById('inferenceContent');
    let inferScrollTimer = null;
    inferEl.addEventListener('scroll', function() {
        const atBottom = inferEl.scrollHeight - inferEl.scrollTop - inferEl.clientHeight < 20;
        inferenceUserScrolling = !atBottom;
        // Reset after user stops scrolling and is at bottom
        clearTimeout(inferScrollTimer);
        inferScrollTimer = setTimeout(function() {
            const stillAtBottom = inferEl.scrollHeight - inferEl.scrollTop - inferEl.clientHeight < 20;
            if (stillAtBottom) inferenceUserScrolling = false;
        }, 300);
    });
    // Detect touch/mouse interaction
    inferEl.addEventListener('pointerdown', function() { inferenceUserScrolling = true; });
    inferEl.addEventListener('pointerup', function() {
        setTimeout(function() {
            const atBottom = inferEl.scrollHeight - inferEl.scrollTop - inferEl.clientHeight < 20;
            if (atBottom) inferenceUserScrolling = false;
        }, 200);
    });
})();
